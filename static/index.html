<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Bot — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#06061A;
  --surf:#0D0D26;
  --surf-v:#131336;
  --surf-hi:#1C1C4A;
  --primary:#C4A6FF;
  --primary-dim:rgba(196,166,255,.12);
  --secondary:#80FFDB;
  --gold:#FFB86C;
  --green:#72EFA0;
  --red:#FF6B6B;
  --text:#E6E1EF;
  --text-dim:#8E8A9E;
  --border:rgba(196,166,255,.1);
  --border-hi:rgba(196,166,255,.35);
  --r-xl:28px;--r-lg:18px;--r-md:12px;--r-sm:8px;
}

html{scroll-behavior:smooth}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Three.js canvas ── */
#bg-canvas{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
}

.app{position:relative;z-index:1}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 32px;
  background:rgba(6,6,26,.75);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}

.logo{
  display:flex;align-items:center;gap:10px;
  font-weight:800;font-size:1.15rem;letter-spacing:-.025em;
}

.logo-icon{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--primary),var(--secondary));
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}

.header-right{
  display:flex;align-items:center;gap:16px;
}

.live-badge{
  display:flex;align-items:center;gap:7px;
  font-size:.78rem;color:var(--text-dim);
}

.live-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(114,239,160,.5);opacity:1}
  50%{box-shadow:0 0 0 5px rgba(114,239,160,0);opacity:.7}
}

/* ── Hero ── */
.hero{
  text-align:center;
  padding:64px 24px 44px;
}

.hero h1{
  font-size:clamp(2.2rem,6vw,4.5rem);
  font-weight:900;
  letter-spacing:-.045em;
  line-height:1.05;
  background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 50%,var(--gold) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:14px;
}

.hero p{
  color:var(--text-dim);
  font-size:.95rem;
  letter-spacing:.01em;
}

/* ── Stats chips ── */
.stats-bar{
  display:flex;flex-wrap:wrap;gap:10px;
  justify-content:center;
  padding:0 24px 40px;
}

.stat-chip{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:100px;
  padding:8px 18px;
  font-size:.8rem;
  color:var(--text-dim);
}

.stat-chip b{color:var(--primary);font-weight:700}

/* ── Grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:18px;
  padding:0 28px 96px;
  max-width:1180px;
  margin:0 auto;
}

/* ── Card ── */
.card{
  background:linear-gradient(145deg,rgba(196,166,255,.06),rgba(128,255,219,.03));
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:24px;
  cursor:pointer;
  transition:border-color .25s,box-shadow .25s;
  transform-style:preserve-3d;
  will-change:transform;
  animation:fadeUp .55s ease both;
}

.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.16s}
.card:nth-child(4){animation-delay:.22s}
.card:nth-child(5){animation-delay:.28s}
.card:nth-child(6){animation-delay:.34s}
.card:nth-child(7){animation-delay:.4s}
.card:nth-child(8){animation-delay:.46s}
.card:nth-child(9){animation-delay:.52s}
.card:nth-child(10){animation-delay:.58s}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

.card:hover{
  border-color:var(--border-hi);
  box-shadow:0 0 0 1px rgba(196,166,255,.12),0 24px 60px rgba(0,0,0,.5),0 0 40px rgba(196,166,255,.12);
}

/* Card internals */
.card-rank{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;
  color:var(--primary);text-transform:uppercase;
  margin-bottom:6px;opacity:.8;
}

.card-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:18px;
}

.card-ticker{
  font-size:1.7rem;font-weight:900;letter-spacing:-.035em;line-height:1;
}

.card-name{
  font-size:.76rem;color:var(--text-dim);margin-top:4px;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

.price-block{text-align:right}

.price-val{
  font-size:1.35rem;font-weight:800;letter-spacing:-.025em;
}

.price-chg{
  display:inline-block;
  font-size:.76rem;font-weight:700;
  padding:3px 10px;border-radius:100px;margin-top:5px;
}

.pos{background:rgba(114,239,160,.14);color:var(--green)}
.neg{background:rgba(255,107,107,.14);color:var(--red)}

/* Score */
.score-wrap{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}

.score-label{font-size:.72rem;color:var(--text-dim);min-width:40px}

.score-track{
  flex:1;height:5px;
  background:rgba(255,255,255,.07);
  border-radius:100px;overflow:hidden;
}

.score-bar{
  height:100%;border-radius:100px;
  background:linear-gradient(90deg,var(--primary),var(--secondary));
  width:0;
  transition:width .9s cubic-bezier(.4,0,.2,1);
}

.score-num{
  font-size:.76rem;font-weight:700;color:var(--primary);
  min-width:36px;text-align:right;
}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}

.chip{
  font-size:.7rem;padding:3px 9px;border-radius:100px;
  border:1px solid var(--border);color:var(--text-dim);
  background:rgba(255,255,255,.03);
  white-space:nowrap;
}

/* Verdict */
.verdict{
  font-size:.79rem;color:var(--text-dim);line-height:1.55;
  border-left:2px solid rgba(196,166,255,.3);
  padding-left:10px;
  opacity:0;
  transition:opacity .5s ease;
}
.verdict.show{opacity:1}

/* ── Skeleton ── */
.skel-card{
  background:var(--surf);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  padding:24px;
  animation:shimmer 1.8s infinite;
}

@keyframes shimmer{
  0%,100%{opacity:.35}50%{opacity:.7}
}

.skel-line{
  background:var(--surf-v);border-radius:6px;
  margin-bottom:12px;
}

/* ── Modal ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
}

.modal-overlay.open{opacity:1;pointer-events:all}

.modal-sheet{
  background:var(--surf);
  border:1px solid var(--border-hi);
  border-radius:var(--r-xl);
  width:100%;max-width:580px;
  max-height:92vh;overflow-y:auto;
  padding:28px;
  transform:scale(.93) translateY(24px);
  transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 60px rgba(196,166,255,.08);
}

.modal-overlay.open .modal-sheet{
  transform:scale(1) translateY(0);
}

.modal-head{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:16px;
}

.modal-close{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);
  background:var(--surf-v);
  color:var(--text);cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .15s;
}
.modal-close:hover{background:var(--surf-hi)}

.modal-ticker{
  font-size:2rem;font-weight:900;letter-spacing:-.04em;line-height:1;
}

.modal-company{color:var(--text-dim);font-size:.88rem;margin-top:4px}

.modal-price-row{
  display:flex;align-items:center;gap:12px;
  margin-bottom:4px;
}

.modal-price{
  font-size:2.2rem;font-weight:900;letter-spacing:-.04em;
}

.chart-wrap{
  position:relative;height:200px;
  margin:20px 0;
}

.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-top:16px;
}

.detail-cell{
  background:var(--surf-v);
  border-radius:var(--r-md);
  padding:14px;
}

.detail-cell-label{
  font-size:.68rem;color:var(--text-dim);
  text-transform:uppercase;letter-spacing:.07em;
  margin-bottom:5px;
}

.detail-cell-val{
  font-size:.95rem;font-weight:700;
}

.modal-verdict{
  margin-top:16px;
  font-size:.82rem;line-height:1.6;
  color:var(--text-dim);
  border-left:3px solid rgba(196,166,255,.35);
  padding-left:12px;
}

/* ── Refresh pill ── */
.refresh-pill{
  position:fixed;bottom:20px;right:20px;
  background:rgba(13,13,38,.9);
  border:1px solid var(--border);
  border-radius:100px;
  padding:9px 16px;
  font-size:.76rem;color:var(--text-dim);
  display:flex;align-items:center;gap:7px;
  z-index:100;
  backdrop-filter:blur(16px);
}

/* ── Footer ── */
footer{
  text-align:center;padding:20px 24px;
  color:var(--text-dim);font-size:.75rem;
  border-top:1px solid var(--border);
}

/* ── Error / empty ── */
.empty-state{
  grid-column:1/-1;
  text-align:center;
  padding:60px 24px;
  color:var(--text-dim);
}

.empty-state .icon{font-size:3rem;display:block;margin-bottom:12px}

/* ── Responsive ── */
@media(max-width:640px){
  header{padding:12px 16px}
  .hero{padding:44px 16px 32px}
  .grid{padding:0 16px 80px;gap:14px}
  .modal-sheet{padding:20px}
  .detail-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="app">

    <div class="header-right">

    </div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
    <div class="skel-card"><div class="skel-line" style="height:14px;width:40%"></div><div class="skel-line" style="height:36px;width:55%"></div><div class="skel-line" style="height:12px;width:100%"></div><div class="skel-line" style="height:12px;width:75%"></div></div>
  </div>
</div>

<!-- Modal dettaglio -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">

<!-- CDN: Three.js + Chart.js -->
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
//  Three.js — Particle Network Background
// ══════════════════════════════════════════════════════════════════════════════
(function initParticles() {
  const canvas   = document.getElementById('bg-canvas');
  const isMobile = window.innerWidth < 640;
  const N        = isMobile ? 65 : 130;
  const DIST     = isMobile ? 14 : 18;

  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, .1, 500);
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  camera.position.z = 55;

  // Particles
  const pos = new Float32Array(N * 3);
  const vel = [];
  for (let i = 0; i < N; i++) {
    pos[i*3]   = (Math.random() - .5) * 110;
    pos[i*3+1] = (Math.random() - .5) * 110;
    pos[i*3+2] = (Math.random() - .5) * 25;
    vel.push({ x: (Math.random() - .5) * .022, y: (Math.random() - .5) * .022 });
  }

  const pGeo  = new THREE.BufferGeometry();
  const pAttr = new THREE.BufferAttribute(pos, 3);
  pAttr.setUsage(THREE.DynamicDrawUsage);
  pGeo.setAttribute('position', pAttr);
  const pMat = new THREE.PointsMaterial({ color: 0xC4A6FF, size: .45, transparent: true, opacity: .75, sizeAttenuation: true });
  const pointsMesh = new THREE.Points(pGeo, pMat);
  scene.add(pointsMesh);

  // Lines
  const MAX_L  = 450;
  const lPos   = new Float32Array(MAX_L * 6);
  const lAttr  = new THREE.BufferAttribute(lPos, 3);
  lAttr.setUsage(THREE.DynamicDrawUsage);
  const lGeo   = new THREE.BufferGeometry();
  lGeo.setAttribute('position', lAttr);
  const lMat   = new THREE.LineBasicMaterial({ color: 0x80FFDB, transparent: true, opacity: .11 });
  const linesMesh = new THREE.LineSegments(lGeo, lMat);
  scene.add(linesMesh);

  // Mouse parallax
  let mx = 0, my = 0;
  window.addEventListener('mousemove', e => {
    mx = (e.clientX / innerWidth  - .5) * .8;
    my = (e.clientY / innerHeight - .5) * .8;
  });

  function animate() {
    requestAnimationFrame(animate);
    for (let i = 0; i < N; i++) {
      pos[i*3]   += vel[i].x;
      pos[i*3+1] += vel[i].y;
      if (Math.abs(pos[i*3])   > 55) vel[i].x *= -1;
      if (Math.abs(pos[i*3+1]) > 55) vel[i].y *= -1;
    }
    pAttr.needsUpdate = true;

    let lc = 0;
    for (let i = 0; i < N && lc < MAX_L; i++) {
      for (let j = i + 1; j < N && lc < MAX_L; j++) {
        const dx = pos[i*3] - pos[j*3], dy = pos[i*3+1] - pos[j*3+1];
        if (dx*dx + dy*dy < DIST*DIST) {
          lPos[lc*6]=pos[i*3]; lPos[lc*6+1]=pos[i*3+1]; lPos[lc*6+2]=pos[i*3+2];
          lPos[lc*6+3]=pos[j*3]; lPos[lc*6+4]=pos[j*3+1]; lPos[lc*6+5]=pos[j*3+2];
          lc++;
        }
      }
    }
    lGeo.setDrawRange(0, lc * 2);
    lAttr.needsUpdate = true;

    // Slow camera drift + parallax
    camera.position.x += (mx - camera.position.x) * .03;
    camera.position.y += (-my - camera.position.y) * .03;
    pointsMesh.rotation.z += .00025;

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
})();


// ══════════════════════════════════════════════════════════════════════════════
//  3D Card Tilt
// ══════════════════════════════════════════════════════════════════════════════
function addTilt(el) {
  el.addEventListener('mousemove', e => {
    const r  = el.getBoundingClientRect();
    const rx = -((e.clientY - r.top  - r.height / 2) / r.height) * 13;
    const ry =  ((e.clientX - r.left - r.width  / 2) / r.width)  * 13;
    el.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-7px)`;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) translateY(0px)';
  });
}


// ══════════════════════════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════════════════════════
const fmtP = v  => v !== undefined && v !== null ? '$' + (v < 1 ? v.toFixed(4) : v.toFixed(2)) : '—';
const fmtC = v  => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
const now  = () => { const d = new Date(); return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'); };


// ══════════════════════════════════════════════════════════════════════════════
//  Render card
// ══════════════════════════════════════════════════════════════════════════════
function buildCard(d, rank) {
  const pos    = d.day_change_pct >= 0;
  const score  = d.score_10 ?? 5;
  const div    = document.createElement('div');
  div.className = 'card';

  const chipsHTML = [
    d.risk_emoji   ? `<span class="chip">${d.risk_emoji} ${d.risk_level ?? ''}</span>` : '',
    d.news_sentiment_emoji ? `<span class="chip">${d.news_sentiment_emoji} ${d.news_sentiment_label ?? 'Neutre'}</span>` : '',
    d.next_earnings_str    ? `<span class="chip">📅 ${d.next_earnings_str}</span>` : '',
  ].join('');

  div.innerHTML = `
    <div class="card-rank"># ${rank}</div>
    <div class="card-row">
      <div>
        <div class="card-ticker">${d.ticker}</div>
        <div class="card-name">${d.name ?? d.ticker}</div>
      </div>
      <div class="price-block">
        <div class="price-val">${fmtP(d.current_price)}</div>
        <div class="price-chg ${pos ? 'pos' : 'neg'}">${fmtC(d.day_change_pct)}</div>
      </div>
    </div>
    <div class="score-wrap">
      <span class="score-label">Score</span>
      <div class="score-track"><div class="score-bar" data-s="${score}"></div></div>
      <span class="score-num">${score}<span style="font-weight:400;color:var(--text-dim)">/10</span></span>
    </div>
    ${chipsHTML ? `<div class="chips">${chipsHTML}</div>` : ''}
    <div class="verdict">${d.verdict ? '🎯 ' + d.verdict : ''}</div>
  `;

  div.addEventListener('click', () => openModal(d));
  addTilt(div);
  return div;
}

function animateBars(grid) {
  requestAnimationFrame(() => {
    grid.querySelectorAll('.score-bar').forEach(el => {
      el.style.width = (parseFloat(el.dataset.s) * 10) + '%';
    });
    setTimeout(() => {
      grid.querySelectorAll('.verdict').forEach(el => el.classList.add('show'));
    }, 350);
  });
}


// ══════════════════════════════════════════════════════════════════════════════
//  Modal + Chart.js
// ══════════════════════════════════════════════════════════════════════════════
let activeChart = null;

async function openModal(stock) {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');

  // Prima mostra dati di base dal card
  document.getElementById('m-ticker').textContent  = stock.ticker;
  document.getElementById('m-company').textContent = stock.name ?? stock.ticker;
  document.getElementById('m-price').textContent   = fmtP(stock.current_price);
  const chgEl = document.getElementById('m-chg');
  chgEl.textContent  = fmtC(stock.day_change_pct);
  chgEl.className    = 'price-chg ' + (stock.day_change_pct >= 0 ? 'pos' : 'neg');

  document.getElementById('m-details').innerHTML  = '';
  document.getElementById('m-verdict').textContent = '';

  // Poi carica dati completi + history in parallelo
  try {
    const [full, hist] = await Promise.all([
      fetch(`/api/stock/${stock.ticker}`).then(r => r.ok ? r.json() : stock),
      fetch(`/api/stock/${stock.ticker}/history`).then(r => r.ok ? r.json() : []),
    ]);

    // Aggiorna modal con dati completi
    document.getElementById('m-company').textContent = full.name ?? stock.ticker;
    document.getElementById('m-price').textContent   = fmtP(full.current_price);
    chgEl.textContent = fmtC(full.day_change_pct);
    chgEl.className   = 'price-chg ' + (full.day_change_pct >= 0 ? 'pos' : 'neg');

    const cells = [
      ['RSI (14)',    full.rsi        ? full.rsi.toFixed(0) + '/100' : '—'],
      ['Rischio',     (full.risk_emoji ?? '') + ' ' + (full.risk_level ?? '—')],
      ['Volatilità',  full.volatility ? full.volatility.toFixed(0) + '%' : '—'],
      ['Score',       (full.score_10 ?? stock.score_10 ?? '—') + '/10'],
      ['Notizie',     (full.news_sentiment_emoji ?? '⚪') + ' ' + (full.news_sentiment_label ?? 'Neutre')],
      ['Earnings',    full.next_earnings_str ?? '—'],
      ['Settimana',   full.week_return  != null ? (full.week_return  >= 0 ? '+' : '') + full.week_return.toFixed(1)  + '%' : '—'],
      ['Mese',        full.month_return != null ? (full.month_return >= 0 ? '+' : '') + full.month_return.toFixed(1) + '%' : '—'],
    ];
    document.getElementById('m-details').innerHTML = cells.map(([l, v]) =>
      `<div class="detail-cell"><div class="detail-cell-label">${l}</div><div class="detail-cell-val">${v}</div></div>`
    ).join('');

    const sigText = full.signals?.join(' · ');
    document.getElementById('m-verdict').textContent = sigText ?? '';

    // Chart
    if (activeChart) { activeChart.destroy(); activeChart = null; }
    if (hist.length > 2) {
      const isUp  = hist[hist.length - 1].close >= hist[0].close;
      const cUp   = 'rgba(114,239,160,';
      const cDown = 'rgba(255,107,107,';
      const base  = isUp ? cUp : cDown;

      const ctx = document.getElementById('detail-chart').getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 200);
      grad.addColorStop(0, base + '.35)');
      grad.addColorStop(1, base + '0)');

      activeChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: hist.map(h => h.date.slice(5)),
          datasets: [{
            data: hist.map(h => h.close),
            borderColor:     isUp ? '#72EFA0' : '#FF6B6B',
            backgroundColor: grad,
            fill: true,
            tension: .38,
            pointRadius: 0,
            borderWidth: 2.2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(13,13,38,.9)',
              borderColor: 'rgba(196,166,255,.2)',
              borderWidth: 1,
              titleColor: '#C4A6FF',
              bodyColor: '#E6E1EF',
              callbacks: { label: ctx => '  $' + ctx.raw.toFixed(4) },
            },
          },
          scales: {
            x: {
              grid: { color: 'rgba(255,255,255,.04)' },
              ticks: { color: '#8E8A9E', maxTicksLimit: 7, font: { size: 11, family: 'Inter' } },
            },
            y: {
              grid: { color: 'rgba(255,255,255,.04)' },
              ticks: { color: '#8E8A9E', font: { size: 11, family: 'Inter' }, callback: v => '$' + v.toFixed(2) },
            },
          },
          animation: { duration: 600, easing: 'easeOutQuart' },
        },
      });
    }

  } catch (e) {
    console.error('Errore modal:', e);
  }
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}


// ══════════════════════════════════════════════════════════════════════════════
//  Load data
// ══════════════════════════════════════════════════════════════════════════════
async function loadData() {
  const grid = document.getElementById('grid');

  try {
    const data = await fetch('/api/scan?top=10').then(r => r.json());

    if (!Array.isArray(data) || data.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="icon">⚠️</span>
          Nessun dato disponibile. Il server sta caricando…<br>
          <small style="margin-top:8px;display:block">Riprova tra qualche minuto</small>
        </div>`;
      return;
    }

    // Stats
    const avg = (data.reduce((s, d) => s + (d.score_10 ?? 5), 0) / data.length).toFixed(1);
    const top = data.reduce((a, b) => Math.abs(a.day_change_pct) > Math.abs(b.day_change_pct) ? a : b);
    document.getElementById('s-total').textContent = data.length;
    document.getElementById('s-avg').textContent   = avg + ' / 10';
    document.getElementById('s-top').textContent   = top.ticker + ' ' + fmtC(top.day_change_pct);

    // Cards
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();
    data.forEach((d, i) => frag.appendChild(buildCard(d, i + 1)));
    grid.appendChild(frag);
    animateBars(grid);

    document.getElementById('last-update').textContent = now();

    // Enrich cards progressivamente in background
    data.forEach((stock, i) => {
      setTimeout(async () => {
        try {
          const full = await fetch(`/api/stock/${stock.ticker}`).then(r => r.ok ? r.json() : null);
          if (!full) return;
          const card = grid.children[i];
          if (!card) return;
          card.querySelector('.card-name').textContent = full.name ?? stock.ticker;
          const vEl = card.querySelector('.verdict');
          const sig = full.signals?.slice(0, 2).join(' · ');
          if (vEl && sig) {
            vEl.textContent = '🔍 ' + sig;
            vEl.classList.add('show');
          }
          // Aggiorna chips con notizie/earnings se non presenti
          const chips = card.querySelector('.chips');
          if (chips && !chips.innerHTML.includes('📅') && full.next_earnings_str) {
            chips.innerHTML += `<span class="chip">📅 ${full.next_earnings_str}</span>`;
          }
        } catch (_) {}
      }, i * 400); // stagger per non sovraccaricare il server
    });

  } catch (e) {
    console.error('Errore caricamento:', e);
    grid.innerHTML = `
      <div class="empty-state">
        <span class="icon">❌</span>
        Errore connessione al server.<br>
        <small style="margin-top:8px;display:block">Assicurati che il bot sia in esecuzione</small>
      </div>`;
  }
}


// ══════════════════════════════════════════════════════════════════════════════
//  Countdown & auto-refresh
// ══════════════════════════════════════════════════════════════════════════════
let cdVal = 60;
let cdTimer = null;

function startCountdown() {
  cdVal = 60;
  document.getElementById('countdown').textContent = cdVal;
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(() => {
    cdVal--;
    document.getElementById('countdown').textContent = cdVal;
    if (cdVal <= 0) {
      clearInterval(cdTimer);
      loadData().then(startCountdown);
    }
  }, 1000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadData().then(startCountdown);
</script>
